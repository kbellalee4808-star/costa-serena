:root{--navy:#1B3A5C;--navy2:#13283f;--gold:#D4A94A;--ivory:#FAF7F2;--ink:#22303f;--muted:#6f7d8a;--line:#e7e0d3;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ivory);color:var(--ink);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;}
body{min-height:100dvh;}
.disp{font-family:'Gmarket Sans','Noto Sans KR',sans-serif;}
/* HEADER */
header{position:sticky;top:0;z-index:50;background:linear-gradient(150deg,#22507c,var(--navy) 60%,var(--navy2));
 color:#fff;padding:18px 18px calc(16px);padding-top:max(18px,env(safe-area-inset-top));box-shadow:0 6px 22px rgba(19,40,63,.22);}
.hwrap{max-width:680px;margin:0 auto;}
.over{font-family:'Gmarket Sans';font-weight:700;letter-spacing:.34em;color:var(--gold);font-size:11px;}
.htitle{font-family:'Gmarket Sans';font-weight:700;font-size:22px;margin-top:7px;letter-spacing:-.2px;}
.htitle small{font-weight:300;color:#cfe0ef;font-size:14px;margin-left:6px;}
.searchbox{margin-top:14px;position:relative;display:flex;align-items:center;}
.searchbox svg{position:absolute;left:16px;width:20px;height:20px;stroke:#9fb2c4;pointer-events:none;}
#q{width:100%;height:54px;border:none;border-radius:14px;padding:0 46px 0 46px;font-size:16px;font-family:'Noto Sans KR';
 background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.12);outline:none;}
#q::placeholder{color:#aeb8c2;}
#clear{position:absolute;right:9px;width:40px;height:40px;border:none;background:#eef1f4;border-radius:50%;
 color:#7b8a99;font-size:18px;display:none;align-items:center;justify-content:center;cursor:pointer;}
.chips{display:flex;gap:8px;overflow-x:auto;margin-top:12px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;min-height:46px;padding:0 16px;display:flex;align-items:center;border-radius:30px;border:1px solid rgba(255,255,255,.35);
 background:rgba(255,255,255,.08);color:#e7eef5;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--gold);border-color:var(--gold);color:#1b2f45;font-weight:700;}
/* MAIN */
main{max-width:680px;margin:0 auto;padding:18px 16px calc(40px + env(safe-area-inset-bottom));}
.count{font-size:13px;color:var(--muted);margin:4px 2px 14px;}
.count b{color:var(--navy);font-weight:700;}
.card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;
 padding:15px 16px;margin-bottom:11px;box-shadow:0 3px 12px rgba(27,58,92,.05);}
.badge{flex:0 0 auto;min-width:62px;min-height:62px;border-radius:14px;background:var(--navy);color:#fff;

.badge .num{font-family:'Gmarket Sans';font-weight:700;font-size:22px;letter-spacing:-.5px;text-align:center;}

.card.amen .badge{background:linear-gradient(155deg,#d9b257,#c79a35);color:var(--navy);}
.info{flex:1;min-width:0;}

.empty .big{font-family:'Gmarket Sans';font-weight:700;font-size:18px;color:var(--navy);margin-bottom:8px;}
.hint{font-size:12.5px;color:#a7b0ba;margin-top:6px;}
footer{max-width:680px;margin:0 auto;padding:22px 16px calc(30px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
 color:#9aa4ae;font-size:12px;line-height:1.7;text-align:center;}

}

a", "note": "사우나·마사지·테라피·피트니스", "k": "스파 spa 사우나 마사지 찜질 테라피 samsara 사마사 웰니스 헬스 헬스장 짐 gym 피트니스 운동 사우나"}, {"n": "비너스 뷰티 살롱", "d": "11", "cat": "spa", "note": "헤어·네일·뷰티", "k": "미용실 헤어 살롱 뷰티 네일 beauty 머리 venus"}, {"n": "객실 (스테이트룸)", "d": "1·2·6·7·8·9·10·11", "cat": "cabin", "note": "내측·해측·발코니 객실", "k": "객실 방 캐빈 스테이트룸 cabin room 발코니 내측 해측 침실"}, {"n": "SO 스위트", "d": "11", "cat": "cabin", "note": "상위 등급 스위트", "k": "스위트 suite so스위트 특실"}, {"n": "선교 (브리지)", "d": "8", "cat": "cabin", "note": "조타실 (승무원 구역)", "k": "브리지 선교 bridge 조타실"}];
const CATS = {"service": {"label": "서비스", "color": "#2E7D6B"}, "dining": {"label": "식당 · 바", "color": "#C79A35"}, "show": {"label": "엔터테인먼트", "color": "#1B3A5C"}, "pool": {"label": "수영장 · 야외", "color": "#2F6FA8"}, "spa": {"label": "스파 · 뷰티", "color": "#B07A8C"}, "cabin": {"label": "객실", "color": "#8893a0"}};
const listEl=document.getElementById('list'), countEl=document.getElementById('count');
const qEl=document.getElementById('q'), clearEl=document.getElementById('clear'), chipsEl=document.getElementById('chips');
let activeCat='all';

const chipDefs=[['all','전체']].concat(Object.keys(CATS).map(k=>[k,CATS[k].label]));
chipsEl.innerHTML=chipDefs.map(([k,l])=>`<button class="chip${k==='all'?' on':''}" data-cat="${k}">${l}</button>`).join('');
chipsEl.addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;
 activeCat=b.dataset.cat;[...chipsEl.children].forEach(c=>c.classList.toggle('on',c===b));render();});

function norm(s){return (s||'').toLowerCase().replace(/\s+/g,'');}
function render(){
 const raw=qEl.value.trim(); const terms=raw.toLowerCase().split(/\s+/).filter(Boolean);
 clearEl.style.display=raw?'flex':'none';
 let rows=DATA.filter(f=>{
   if(activeCat!=='all' && f.cat!==activeCat) return false;
   if(!terms.length) return true;
   const hay=norm(f.n+' '+f.k+' '+f.note+' '+f.d+'층');
   return terms.every(t=>hay.includes(norm(t)));
 });
 if(!rows.length){
   countEl.textContent='';
   listEl.innerHTML=`<div class="empty"><div class="big">검색 결과가 없어요</div>
     <div>다른 키워드로 찾아보세요</div>
     <div class="hint">예) 뷔페 · 게스트서비스 · 스파 · 카지노 · 키즈 · 면세점 · 의무실</div></div>`;
   return;
 }
 countEl.innerHTML = raw||activeCat!=='all' ? `<b>${rows.length}</b>개 시설` : `전체 <b>${rows.length}</b>개 시설 · 시설명을 입력해 보세요`;
 listEl.innerHTML=rows.map(f=>{
   const c=CATS[f.cat]; const amen=f.cat!=='cabin'&&f.cat!=='service'?'':''; 
   const isAmen=['dining','show','pool','spa'].includes(f.cat);
   return `<div class="card${isAmen?' amen':''}">
     <div class="badge"><div class="num">${f.d}<span style="font-size:13px">층</span></div><div class="ck">DECK</div></div>
     <div class="info">
       <div class="disp fname">${f.n}</div>
       <div class="fnote">${f.note}</div>
       <span class="tag" style="background:${c.color}">${c.label}</span>
     </div></div>`;
 }).join('');
}
qEl.addEventListener('input',render);
clearEl.addEventListener('click',()=>{qEl.value='';qEl.focus();render();});
render();
</script>
